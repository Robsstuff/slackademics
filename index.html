<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slackademics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#e2e8f0;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh}
#app{max-width:920px;margin:0 auto;padding:8px}
@keyframes popIn{from{transform:scale(0.8);opacity:0}50%{transform:scale(1.05)}to{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardReveal{from{transform:rotateY(90deg);opacity:0}to{transform:rotateY(0);opacity:1}}
.fade-in{animation:fadeIn 0.25s ease-out}

/* TITLE */
.title-screen{text-align:center;padding:24px 12px}
.game-title{font-size:2rem;font-weight:900;color:#7c6ff7;letter-spacing:3px;text-transform:uppercase;text-shadow:0 0 20px rgba(124,111,247,0.5);margin-bottom:4px}
.game-subtitle{font-size:0.8rem;color:#718096;margin-bottom:20px;letter-spacing:1px;text-transform:uppercase}
.name-input{background:#1a1a3e;border:2px solid #2d2d5e;color:#e2e8f0;padding:10px 14px;font-size:1rem;border-radius:8px;width:240px;margin-bottom:14px;outline:none;transition:border-color 0.2s}
.name-input:focus{border-color:#7c6ff7}

/* BUTTONS */
.btn{border:none;border-radius:8px;padding:9px 18px;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px}
.btn:hover{filter:brightness(1.12);transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn-primary{background:#7c6ff7;color:#fff}
.btn-success{background:#48bb78;color:#fff}
.btn-danger{background:#e53e3e;color:#fff}
.btn-warning{background:#ed8936;color:#fff}
.btn-muted{background:#2d3748;color:#a0aec0}
.btn-outline{background:transparent;color:#7c6ff7;border:2px solid #7c6ff7}
.btn-sm{padding:7px 16px;font-size:0.82rem}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btn-group.center{justify-content:center}

/* STATUS BAR */
.status-bar{background:#1a1a3e;border:1px solid #2d2d5e;border-radius:10px;padding:8px 10px;margin-bottom:10px}
.status-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-weight:700;font-size:0.8rem}
.badge-purple{background:#553c9a;color:#e9d8fd}
.badge-gold{background:#744210;color:#fbd38d}
.badge-green{background:#1c4532;color:#68d391}
.badge-red{background:#742a2a;color:#feb2b2}
.player-rows{display:flex;flex-direction:column;gap:2px}
.pr{display:grid;grid-template-columns:90px 44px 38px 38px 50px 1fr;gap:4px;align-items:center;padding:4px 3px;border-radius:6px;font-size:0.75rem}
.pr:nth-child(odd){background:rgba(255,255,255,0.03)}
.pr.is-leader{background:rgba(124,111,247,0.12);border-left:3px solid #7c6ff7}
.pr.eliminated{opacity:0.38}
.pr-name{font-weight:600}
.pr-name.human{color:#b794f4}
.pr-score{text-align:right;font-weight:700}
.pr-score.best{color:#fbd38d}
.pr-fails{letter-spacing:1px;font-size:0.9rem}
.pr-hand{display:flex;gap:4px;flex-wrap:wrap}
.status-hint{font-size:0.75rem;color:#4a5568;margin-top:6px}

/* SMALL CARD */
.sc{display:inline-flex;align-items:center;justify-content:center;width:32px;height:44px;border-radius:5px;font-weight:900;font-size:0.8rem;flex-shrink:0;border:2px solid transparent;transition:all 0.15s}
.sc.playable{cursor:pointer}
.sc.playable:hover{transform:translateY(-5px);border-color:#fff}
.sc.selected{transform:translateY(-7px);border-color:#7c6ff7;box-shadow:0 0 10px rgba(124,111,247,0.7)}
.sc.disabled{opacity:0.35;cursor:not-allowed}
.sc-0{background:#2d3748;color:#718096}
.sc-1{background:#742a2a;color:#feb2b2}
.sc-2{background:#7b341e;color:#fbd38d}
.sc-3{background:#744210;color:#fefcbf}
.sc-4{background:#276749;color:#9ae6b4}
.sc-5{background:#2c7a7b;color:#81e6d9}
.sc-6{background:#2a4365;color:#90cdf4}
.sc-7{background:#44337a;color:#e9d8fd}
.sc-8{background:#1a202c;color:#f6ad55;border-color:#f6ad55}
.sc-x2{background:#553c9a;color:#e9d8fd;font-size:0.78rem}
.sc-hidden{background:#252547;color:#4a5568;border:2px dashed #4a5568;font-size:1.2rem}
.sc-last{background:#252547;color:#ed8936;border:2px dashed #ed8936;font-size:1rem}

/* REVEAL CARD (larger) */
.rc{display:inline-flex;align-items:center;justify-content:center;width:44px;height:60px;border-radius:8px;font-weight:900;font-size:1rem;flex-shrink:0;border:2px solid transparent}
.rc-0{background:#2d3748;color:#718096}
.rc-1{background:#742a2a;color:#feb2b2}
.rc-2{background:#7b341e;color:#fbd38d}
.rc-3{background:#744210;color:#fefcbf}
.rc-4{background:#276749;color:#9ae6b4}
.rc-5{background:#2c7a7b;color:#81e6d9}
.rc-6{background:#2a4365;color:#90cdf4}
.rc-7{background:#44337a;color:#e9d8fd}
.rc-8{background:#1a202c;color:#f6ad55;border-color:#f6ad55}
.rc-x2{background:#553c9a;color:#e9d8fd;font-size:0.95rem}
.rc-hidden{background:#252547;color:#4a5568;border:2px dashed #4a5568;font-size:1.4rem}
.rc-last{background:#252547;color:#ed8936;border:2px dashed #ed8936;font-size:1rem}
.rc-new{animation:cardReveal 0.35s ease-out}

/* PANELS */
.panel{background:#1a1a3e;border:1px solid #2d2d5e;border-radius:10px;padding:10px;margin-bottom:10px}
.panel-title{font-size:0.88rem;font-weight:800;color:#7c6ff7;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

/* EXAM CARD */
.exam-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
@media(max-width:600px){.exam-layout{grid-template-columns:1fr}}
.exam-img{width:100%;border-radius:10px;border:2px solid #2d2d5e;min-height:160px;background:#252547;object-fit:cover}
.exam-info{background:#1a1a3e;border:1px solid #2d2d5e;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px}
.exam-name{font-size:1.3rem;font-weight:900;color:#7c6ff7}
.exam-desc{color:#a0aec0;font-style:italic;font-size:0.88rem;line-height:1.5;flex:1}
.exam-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #2d2d5e;font-size:0.88rem}
.exam-row:last-child{border-bottom:none}
.exam-lbl{color:#718096}
.exam-val{font-weight:700}
.skill-pill{background:#2d2d5e;border-radius:8px;padding:8px 10px;font-size:0.82rem;margin-top:4px}
.skill-pill-name{color:#b794f4;font-weight:700;margin-bottom:3px}
.skill-pill-desc{color:#a0aec0}

/* SPEECH */
.speech-input{width:100%;background:#252547;border:1px solid #2d2d5e;color:#e2e8f0;padding:10px 12px;border-radius:8px;font-size:0.92rem;resize:none;outline:none;margin-top:6px}
.speech-input:focus{border-color:#7c6ff7}
.speech-bubble{padding:9px 14px;border-left:3px solid #7c6ff7;background:rgba(124,111,247,0.07);border-radius:4px;font-style:italic;color:#a0aec0;font-size:0.88rem;margin-bottom:8px}

/* REVEAL */
.reveal-pile{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:16px;background:#252547;border-radius:10px;margin-bottom:12px}
.effort-progress{text-align:center;padding:10px;font-size:1.05rem;font-weight:700;background:#252547;border-radius:8px;margin-bottom:10px}
.ep-pass{color:#48bb78}
.ep-fail{color:#fc8181}
.ep-mid{color:#fbd38d}

/* RESULT */
.result-banner{text-align:center;padding:36px 20px;border-radius:16px;margin-bottom:16px;animation:popIn 0.4s ease-out}
.result-pass{background:linear-gradient(135deg,#1c4532,#276749);border:2px solid #48bb78}
.result-fail{background:linear-gradient(135deg,#1a0000,#742a2a);border:2px solid #fc8181}
.result-title{font-size:2.8rem;font-weight:900;letter-spacing:4px}
.result-pass .result-title{color:#48bb78}
.result-fail .result-title{color:#fc8181}
.result-sub{font-size:0.95rem;color:#a0aec0;margin-top:8px}

/* PLAYER SELECT */
.player-grid{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
.pcard{background:#1a1a3e;border:2px solid #2d2d5e;border-radius:10px;padding:12px 16px;cursor:pointer;transition:all 0.15s;min-width:120px}
.pcard:hover{border-color:#7c6ff7;background:rgba(124,111,247,0.1)}
.pcard.selected{border-color:#7c6ff7;background:rgba(124,111,247,0.2)}
.pcard.disabled{opacity:0.38;cursor:not-allowed;pointer-events:none}
.pcard-name{font-weight:700;margin-bottom:3px}
.pcard-info{color:#718096;font-size:0.78rem}

/* SKILL LIST */
.skill-list{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.skill-item{background:#1a1a3e;border:2px solid #2d2d5e;border-radius:10px;padding:12px 14px;cursor:pointer;transition:all 0.15s}
.skill-item:hover{border-color:#b794f4;background:rgba(124,111,247,0.1)}
.skill-item-name{font-weight:700;color:#b794f4;margin-bottom:3px}
.skill-item-desc{color:#a0aec0;font-size:0.82rem}

/* BLAME */
.blame-box{background:linear-gradient(135deg,#1a0000,#2d1a1a);border:2px solid #e53e3e;border-radius:12px;padding:18px;margin-bottom:14px}
.blame-title{color:#fc8181;font-size:1.1rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}

/* NOTIFICATIONS */
.notif{padding:8px 14px;border-radius:6px;font-size:0.85rem;margin-bottom:8px;border-left:4px solid #7c6ff7;background:#252547;color:#a0aec0}
.notif.ok{border-color:#48bb78;color:#9ae6b4;background:rgba(72,187,120,0.08)}
.notif.bad{border-color:#e53e3e;color:#feb2b2;background:rgba(229,62,62,0.08)}
.notif.warn{border-color:#ed8936;color:#fbd38d;background:rgba(237,137,54,0.08)}

/* SCORES TABLE */
.scores-table{width:100%;border-collapse:collapse;margin:14px 0}
.scores-table th{background:#2d2d5e;padding:9px 12px;text-align:right;font-size:0.8rem;color:#718096;text-transform:uppercase;letter-spacing:1px}
.scores-table th:first-child{text-align:left}
.scores-table td{padding:9px 12px;border-bottom:1px solid #2d2d5e;text-align:right;font-size:0.88rem}
.scores-table td:first-child{text-align:left;font-weight:600}
.scores-table tr.winner-row td{color:#fbd38d;font-weight:700}
.scores-table tr.expelled-row td{opacity:0.45}

/* PARTY PILE DISPLAY */
.party-piles{display:flex;flex-direction:column;gap:4px}
.pp-row{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid #2d2d5e;flex-wrap:wrap}
.pp-row:last-child{border-bottom:none}
.pp-name{min-width:90px;font-weight:600;font-size:0.85rem}
.pp-pts{min-width:50px;color:#fbd38d;font-weight:700;font-size:0.82rem}

/* HALFTIME */
.halftime-title{font-size:2.4rem;font-weight:900;color:#fbd38d;letter-spacing:3px;text-align:center;margin:20px 0 8px;animation:popIn 0.5s ease-out}
.halftime-sub{text-align:center;color:#a0aec0;margin-bottom:20px}

/* MISC */
.divider{border:none;border-top:1px solid #2d2d5e;margin:14px 0}
.text-muted{color:#718096;font-size:0.82rem}
.text-purple{color:#b794f4}
.text-green{color:#68d391}
.text-red{color:#fc8181}
.text-yellow{color:#fbd38d}
.center{text-align:center}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mb-12{margin-bottom:12px}
.mb-16{margin-bottom:16px}
.row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.label{font-size:0.75rem;color:#718096;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}

@media(max-width:480px){
  #app{padding:5px}
  .status-bar{padding:6px 7px;margin-bottom:7px}
  .status-top{gap:4px;margin-bottom:6px}
  .badge{font-size:0.7rem;padding:2px 8px}
  .pr{grid-template-columns:80px 38px 34px 34px 44px 1fr;gap:3px;font-size:0.7rem;padding:3px 2px}
  .status-hint{display:none}
  .panel{padding:8px;margin-bottom:7px}
  .panel-title{font-size:0.8rem;margin-bottom:6px}
  .btn{padding:8px 14px;font-size:0.82rem}
  .btn-group{gap:6px;margin-top:10px}
  .exam-layout{grid-template-columns:1fr}
  .exam-img{min-height:120px;max-height:150px}
  .result-title{font-size:2rem}
  .result-banner{padding:20px 12px}
  .halftime-title{font-size:1.6rem}
  .reveal-pile{gap:5px;padding:10px}
  .effort-progress{font-size:0.9rem;padding:7px}
  .notif{padding:6px 10px;font-size:0.78rem}
  .game-title{font-size:1.6rem;letter-spacing:2px}
  .scores-table th,.scores-table td{padding:6px 8px;font-size:0.78rem}
  .speech-input{font-size:0.85rem}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// DATA
// ============================================================
const EXAM_R1_4 = [
  {name:"PHIL 101",desc:"Write a 1,000-word essay about the philosopher Haddaway's famous question: 'What is Love?'",effort:11,cel:2,skill:"Diversity is Our Strength",skillDesc:"+1 effort for each unique card value in the effort pile.",blame:"highest",slide:1},
  {name:"SOC 102",desc:"Write a report on how exactly one person ends up doing all the group work.",effort:11,cel:2,skill:"Personal Responsibility",skillDesc:"The Project Leader swaps the final face-down card with one from their own hand.",blame:"highest",slide:2},
  {name:"STAT 201",desc:"Prove statistically that 73% of all statistics are made up on the spot--including this one.",effort:12,cel:2,skill:"Realign Priorities",skillDesc:"Pick a player to swap the final face-down card with their top Party Pile card.",blame:"accuse",slide:3},
  {name:"BIO 215",desc:"Memorize every organ in the human body, then forget them immediately after the exam.",effort:12,cel:2,skill:"Pull an All Nighter",skillDesc:"Pick 2 players: each plays an extra effort card from their hand (no party card this round).",blame:"accuse",slide:4},
  {name:"MKTG 250",desc:"Create a campaign convincing people they need something they've lived without for 20 years.",effort:13,cel:2,skill:"Round of Coffee",skillDesc:"All effort pile cards with value 1 or 2 are doubled.",blame:"highest",slide:5},
  {name:"CSCI 220",desc:"Write code that works perfectly... until the professor runs it.",effort:13,cel:2,skill:"Extend the Deadline",skillDesc:"Each player picks up a card from the effort pile, then replays an effort card face-up.",blame:"accuse",slide:6},
  {name:"HIST 305",desc:"Explain a historical event through badly labeled maps and vague dates like 'the late 1800s.'",effort:14,cel:2,skill:"Plagiarize",skillDesc:"Any X2 cards in the effort pile become X3 instead.",blame:"highest",slide:7},
  {name:"PSYC 290",desc:"Design an experiment proving that procrastination is a legitimate time management strategy.",effort:14,cel:2,skill:"Curve the Grade",skillDesc:"Subtract 6 from effort required. Add 6 to the next exam's effort.",blame:"accuse",slide:8},
];
const EXAM_R5_8 = [
  {name:"ECON 302",desc:"Explain why textbooks cost $300 using supply and demand curves.",effort:15,cel:3,skill:"Diversity is Our Strength",skillDesc:"+1 effort for each unique card value in the effort pile.",blame:"highest",slide:9},
  {name:"ENGR 401",desc:"Build a project where the math works but the physical object absolutely does not.",effort:15,cel:3,skill:"Personal Responsibility",skillDesc:"The Project Leader swaps the final face-down card with one from their own hand.",blame:"highest",slide:10},
  {name:"ENGL 315",desc:"Write 5,000 words analyzing why the curtains were blue (the author just liked blue).",effort:16,cel:3,skill:"Realign Priorities",skillDesc:"Pick a player to swap the final face-down card with their top Party Pile card.",blame:"accuse",slide:11},
  {name:"CHEM 340",desc:"Mix clear liquids together and explain why the result is somehow purple and mildly alarming.",effort:16,cel:3,skill:"Pull an All Nighter",skillDesc:"Pick 2 players: each plays an extra effort card from their hand (no party card this round).",blame:"accuse",slide:12},
  {name:"BUSN 420",desc:"Analyze why Netflix keeps canceling good shows after one season. Cite your sources.",effort:17,cel:3,skill:"Round of Coffee",skillDesc:"All effort pile cards with value 1 or 2 are doubled.",blame:"highest",slide:13},
  {name:"PHYS 350",desc:"Prove thermodynamics is real by explaining why your dorm room entropy only increases.",effort:17,cel:3,skill:"Extend the Deadline",skillDesc:"Each player picks up a card from the effort pile, then replays an effort card face-up.",blame:"accuse",slide:14},
  {name:"ART 275",desc:"Create a piece of art and write a 3-page explanation of what it 'really' means.",effort:18,cel:3,skill:"Plagiarize",skillDesc:"Any X2 cards in the effort pile become X3 instead.",blame:"accuse",slide:15},
  {name:"MUSC 380",desc:"Compose a symphony or just sample Pachelbel's Canon like everybody else does.",effort:21,cel:3,skill:"Leave the Group",skillDesc:"Discard the final face-down card (unrevealed). Reduce effort by 3. Immune from blame.",blame:"highest",slide:16},
];
const ALL_SKILLS = ["Diversity is Our Strength","Personal Responsibility","Realign Priorities","Pull an All Nighter","Round of Coffee","Extend the Deadline","Plagiarize","Curve the Grade","Leave the Group"];
const AI_SPEECHES = [
  n=>`"${n}: Look, we just need to pass. Don't overthink it."`,
  n=>`"${n}: Everyone just play a 3. I'm definitely going to. Probably."`,
  n=>`"${n}: If we all pitch in a tiny bit, we'll totally nail this!"`,
  n=>`"${n}: I have full confidence in this team. By which I mean myself."`,
  n=>`"${n}: This one's easy. Trust the process. My process."`,
];

// ============================================================
// UTILS
// ============================================================
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
function randInt(lo,hi){return lo+Math.floor(Math.random()*(hi-lo+1))}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function computeEffort(pile, x3x2=false, trailingX2is7=false){
  // X2 doubles (or triples if x3x2) the next numeric card revealed after it.
  // If X2 is the very last card in the pile (face-down revealed), it scores as 7.
  const mult = x3x2 ? 3 : 2;
  let total = 0;
  let pending = false;
  for(let i=0; i<pile.length; i++){
    const c = pile[i];
    const isLast = i === pile.length-1;
    if(c === 'X2'){
      if(isLast && trailingX2is7){ total += pending ? 7*mult : 7; pending=false; }
      else { pending = true; }
    } else if(typeof c === 'number'){
      total += pending ? c*mult : c;
      pending = false;
    }
  }
  return total;
}

function sortedHand(h){return [...h].sort((a,b)=>{if(a==='X2')return 1;if(b==='X2')return -1;return a-b})}

function cardLabel(c){return c==='X2'?'X2':String(c)}
function cardSCClass(c){if(c==='X2')return 'sc-x2';if(c==='hidden')return 'sc-hidden';if(c==='last')return 'sc-last';return `sc-${c}`}
function cardRCClass(c){if(c==='X2')return 'rc-x2';if(c==='hidden')return 'rc-hidden';if(c==='last')return 'rc-last';return `rc-${c}`}

function scHtml(c,extra=''){return `<span class="sc ${cardSCClass(c)} ${extra}">${c==='hidden'?'?':c==='last'?'?':cardLabel(c)}</span>`}
function rcHtml(c,extra=''){return `<span class="rc ${cardRCClass(c)} ${extra}">${c==='hidden'?'?':c==='last'?'?':cardLabel(c)}</span>`}

function removeFromArr(arr,val){const i=arr.indexOf(val);if(i!==-1)arr.splice(i,1)}

// ============================================================
// PLAYER
// ============================================================
function makePlayer(name,isHuman,slack=0.80){
  return{name,isHuman,slack,hand:[],partyPile:[],failMarkers:0,halftimePts:0,celPts:0,eliminated:false,immuneBlame:false};
}
function buildHand(p,noShow=false,desperation=false){
  p.hand=[1,2,3,4,5,6,7,'X2'];
  if(noShow){const i=p.hand.indexOf(1);if(i!==-1)p.hand[i]=0;}
  if(desperation){const i=p.hand.indexOf(7);if(i!==-1)p.hand[i]=8;}
}
function partyTotal(p){return p.partyPile.filter(c=>typeof c==='number').reduce((s,c)=>s+c,0)}
function topPartyVal(p){const nums=p.partyPile.filter(c=>typeof c==='number');return nums.length?nums[nums.length-1]:0}
function playerScore(p){return p.halftimePts+partyTotal(p)+p.celPts}
function discardTopParty(p){for(let i=p.partyPile.length-1;i>=0;i--){if(typeof p.partyPile[i]==='number'){return p.partyPile.splice(i,1)[0]}}return null}

// ============================================================
// AI
// ============================================================
function aiPickEffort(p, effortReq, numActive){
  const numeric = p.hand.filter(c=>typeof c==='number').sort((a,b)=>a-b);
  const hasX2 = p.hand.includes('X2');
  if(!numeric.length && !hasX2) return null;
  if(!numeric.length) return 'X2';
  const fair = effortReq / Math.max(numActive,1);
  let roll = randInt(0,3);
  // Strategy 0: X2 (reroll if gone)
  if(roll===0){ if(hasX2) return 'X2'; roll=randInt(1,3); }
  // Strategy 1: Asshole — lowest
  if(roll===1) return numeric[0];
  // Strategy 2: Fair share — closest to fair
  if(roll===2) return numeric.reduce((b,c)=>Math.abs(c-fair)<Math.abs(b-fair)?c:b);
  // Strategy 3: Generous — random >= fair
  const above=numeric.filter(c=>c>=fair);
  return above.length?rand(above):numeric[numeric.length-1];
}
function aiPickParty(p, exclude){
  let ch=p.hand.filter(c=>c!=='X2'&&c!==exclude);
  if(!ch.length) ch=p.hand.filter(c=>c!=='X2');
  if(!ch.length) return null;
  ch.sort((a,b)=>b-a);
  const r=Math.random();
  if(r<0.4) return ch[0];                                      // 40%: highest
  if(r<0.7) return ch.length>1?ch[1]:ch[0];                   // 30%: second highest
  return ch[Math.floor(Math.random()*ch.length)];              // 30%: random
}

  G.players.forEach(p=>buildHand(p));

}

function addLog(text,type=''){G.log.push({text,type});if(G.log.length>6)G.log.shift()}
function clearLog(){G.log=[]}

function startRound(){
  clearLog();
  G.aiMessages=[];
  G.usedSkill=false;
  G.x3x2=false;
  G.humanEffort=null;
  G.humanParty=null;
  G.effortPile=[];
  G.revealIdx=0;
  G.lastCard=null;
  // skip eliminated leaders
  let tries=0;
  while(G.players[G.leaderIdx].eliminated&&tries<4){G.leaderIdx=(G.leaderIdx+1)%4;tries++}
  const raw=G.roundNum<=4?G.deck14[G.roundNum-1]:G.deck58[G.roundNum-5];
  G.exam={...raw};
  if(G.nextExamBonus>0){G.exam.effort+=G.nextExamBonus;G.nextExamBonus=0;}
  G.finalReq=G.exam.effort;
  G.phase='round_start';
  render();
}

function render(){

function renderPhase(){
  switch(G.phase){
    case 'title': return renderTitle();

    case 'play_effort': return renderPlayEffort();
    case 'play_party': return renderPlayParty();
    case 'reveal': return renderReveal();
    case 'deadline': return renderDeadline();
    case 'skill_select': return renderSkillSelect();
    case 'skill_personal_resp': return renderSkillPersonalResp();
    case 'skill_realign': return renderSkillRealign();
    case 'skill_all_nighter_pick': return renderAllNighterPick();
    case 'skill_all_nighter_extra': return renderAllNighterExtra();

// --- REVEAL ---
function renderReveal(){
  const pile=G.effortPile;
  const revealed=pile.slice(0,G.revealIdx);
  const remaining=pile.slice(G.revealIdx);
  const lastIdx=pile.length-1;
  const allButLastRevealed=(G.revealIdx>=lastIdx);
  const revTotal=computeEffort(revealed,G.x3x2);
  const diff=G.finalReq-revTotal;

  let pileHtml='';
  revealed.forEach((c,i)=>{
    const isNewest=(i===G.revealIdx-1);
    pileHtml+=rcHtml(c,isNewest?'rc-new':'');
  });
  if(!allButLastRevealed){
    remaining.slice(0,-1).forEach(()=>{ pileHtml+=`<span class="rc rc-hidden">?</span>` });
  }
  // always show last card face-down until deadline
  pileHtml+=`<span class="rc rc-last" title="Face-down last card">?</span>`;

  const progressClass=revTotal>=G.finalReq?'ep-pass':diff<=3?'ep-mid':'ep-fail';
  const progressHtml=`<div class="effort-progress"><span class="${progressClass}">${revTotal} / ${G.finalReq}</span> &nbsp;<span class="text-muted">${allButLastRevealed?'(one card face-down)':diff>0?`need ${diff} more`:'already passing!'}</span></div>`;

  const x2note=revealed.filter(c=>c==='X2').length?`<div class="notif warn" style="font-size:0.8rem">X2 doubles the next card revealed after it! (If X2 is the last card, it scores as 7.)</div>`:'';

  return renderStatusBar()+renderLog()+
  `<div class="panel">
    <div class="panel-title">The Reveal &mdash; ${esc(G.exam.name)}</div>
    ${progressHtml}
    <div class="reveal-pile">${pileHtml}</div>
    ${x2note}
    ${allButLastRevealed
      ?`<div class="notif ok">All cards revealed! One face-down card remains. Proceeding to Day of the Deadline...</div><div class="btn-group"><button class="btn btn-primary" onclick="action('to_deadline')">Day of the Deadline &rarr;</button></div>`
      :`<div class="btn-group">
          <button class="btn btn-primary" onclick="action('reveal_next')">Reveal Next Card</button>
          <button class="btn btn-muted" onclick="action('skip_reveal')">Skip to Last</button>
        </div>`
    }
  </div>`;
}

// --- HALFTIME ---
function renderHalftime(){
  const active=getActive();
  const ranked=[...active].sort((a,b)=>(partyTotal(b)+b.celPts)-(partyTotal(a)+a.celPts));
  const n=ranked.length;
  const rows=ranked.map((p,i)=>{
    const ht=partyTotal(p)+p.celPts;
    const noShow=i<2;
    const desp=i>=n-2;
    const mods=[noShow?'No Show (1→0)':'',desp?'Desperation (7→8)':''].filter(Boolean).join(', ');
    return `<tr><td>${i+1}. ${esc(p.name)}</td><td>${partyTotal(p)}</td><td>${p.celPts}</td><td><strong>${ht}</strong></td><td>${mods?`<span class="text-yellow">${mods}</span>`:''}</td></tr>`;
  }).join('');
  return `<div class="halftime-title">HALFTIME</div>
  <div class="halftime-sub">Rounds 1&ndash;4 complete! Scores locked in. New hands dealt.</div>
  <div class="panel">
    <table class="scores-table">
      <thead><tr><th>Player</th><th>Party</th><th>Cel</th><th>Total</th><th>Hand Modifier</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div class="panel"><div class="notif warn">Top 2 players get No Show (1 replaced by 0). Bottom 2 get Desperation (7 replaced by 8). Party Piles reset.</div></div>
  <div class="btn-group center"><button class="btn btn-primary" onclick="action('start_second_half')">Start Second Half &rarr;</button></div>`;
}

// --- END ---
function renderEnd(){
  const sorted=[...G.players].sort((a,b)=>playerScore(b)-playerScore(a));
  const rows=sorted.map((p,i)=>{
    const s=playerScore(p);
    const isWinner=i===0&&!p.eliminated;
    return `<tr class="${isWinner?'winner-row':''}${p.eliminated?' expelled-row':''}">
      <td>${i+1}. ${esc(p.name)}${isWinner?' 🏆':''}</td>
      <td>${p.halftimePts}</td>
      <td>${partyTotal(p)}</td>
      <td>${p.celPts}</td>
      <td><strong>${s}</strong></td>
      <td>${p.eliminated?'Expelled':''}</td>
    </tr>`;
  }).join('');
  const winner=sorted.find(p=>!p.eliminated)||sorted[0];
  return `<div class="halftime-title" style="color:#7c6ff7">GAME OVER</div>
  <div class="halftime-sub">Winner: <strong>${esc(winner.name)}</strong> with ${playerScore(winner)} points!</div>
  <div class="panel">
    <table class="scores-table">
      <thead><tr><th>Player</th><th>Halftime</th><th>Party</th><th>Cel</th><th>Total</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div class="btn-group center"><button class="btn btn-primary" onclick="action('restart')">Play Again</button></div>`;
}

// ============================================================
// ACTION DISPATCH
// ============================================================
function action(name, data){
  switch(name){
    case 'start': doStart(); break;
    case 'to_speech': doToSpeech(); break;
    case 'give_speech': doGiveSpeech(); break;
    case 'play_cards': doPlayCards(); break;
    case 'pick_effort': G.humanEffort=data; render(); break;
    case 'confirm_effort': doConfirmEffort(); break;
    case 'pick_party': G.humanParty=data; render(); break;
    case 'confirm_party': doConfirmParty(); break;
    case 'confirm_party_none': doConfirmParty(true); break;
    case 'reveal_next': doRevealNext(); break;
    case 'skip_reveal': doSkipReveal(); break;
    case 'to_deadline': G.phase='deadline'; render(); break;
    case 'ai_deadline': doAiDeadline(); break;
    case 'let_it_ride': doLetItRide(); break;
    case 'use_skill': G.phase='skill_select'; render(); break;
    case 'pick_skill': doPickSkill(data); break;
    case 'skill_fizzle': doAfterSkill(); break;
    case 'skill_pr_pick': G.humanEffort=data; render(); break;
    case 'skill_pr_confirm': doSkillPersonalRespConfirm(); break;
    case 'skill_realign_pick': doSkillRealignPick(data); break;
    case 'skill_an_toggle': doAnToggle(data); break;
    case 'skill_an_confirm': doAnConfirm(); break;
    case 'skill_an_extra_pick': G.humanEffort=data; render(); break;
    case 'skill_an_extra_confirm': doAnExtraConfirm(); break;
    case 'skill_ext_pickup': doExtPickup(data); break;
    case 'skill_ext_replay_pick': G.humanEffort=data; render(); break;
    case 'skill_ext_replay_confirm': doExtReplayConfirm(); break;
    case 'after_result': doAfterResult(); break;
    case 'give_cel': doGiveCel(data); break;
    case 'accuse': doAccuse(data); break;
    case 'skip_blame': doSkipBlame(); break;
    case 'ai_vote': doAiVote(); break;
    case 'human_vote': doHumanVote(data); break;
    case 'after_blame_vote': doAfterBlameVote(); break;
    case 'ai_redirect': doAiRedirect(); break;
    case 'human_redirect': doHumanRedirect(data); break;
    case 'next_round': doNextRound(); break;
    case 'start_second_half': doStartSecondHalf(); break;
    case 'restart': G.phase='title'; render(); break;
  }
}

// ============================================================
// ACTION HANDLERS
// ============================================================

function doStart(){
  const inp=document.getElementById('nameInput');
  const name=(inp?inp.value.trim():'')||'You';
  initGame(name);
}

function doToSpeech(){
  G.phase='speech';
  render();
}

function doGiveSpeech(){
  const inp=document.getElementById('speechInput');
  const speech=(inp?inp.value.trim():'')||`"${humanPlayer().name}: Come on everyone, just... try? A little bit?"`;
  addLog(`You said: ${speech}`);
  doPlayCards();
}

function doPlayCards(){
  // AI players pick their cards
  const active=getActive();
  const effort={}; const party={};
  active.forEach(p=>{
    if(!p.isHuman){
      const ec=aiPickEffort(p,G.exam.effort,active.length);
      const pc=aiPickParty(p,ec);
      effort[p.name]=ec;
      party[p.name]=pc;
    }
  });
  G._aiEffort=effort;
  G._aiParty=party;
  G.humanEffort=null;
  G.humanParty=null;
  G.phase='play_effort';
  render();
}

function doConfirmEffort(){
  if(G.humanEffort===null) return;
  removeFromArr(humanPlayer().hand,G.humanEffort);
  G.phase='play_party';
  G.humanParty=null;
  render();
}

function doConfirmParty(none=false){
  const p=humanPlayer();
  if(!none&&G.humanParty!==null){
    removeFromArr(p.hand,G.humanParty);
    p.partyPile.push(G.humanParty);
  }
  // Now place AI party cards and collect effort pile
  const active=getActive();
  const effortPile=[];
  if(G.humanEffort!==null) effortPile.push(G.humanEffort);
  active.forEach(ap=>{
    if(!ap.isHuman){
      const ec=G._aiEffort[ap.name];
      const pc=G._aiParty[ap.name];
      if(ec!==null&&ec!==undefined&&ap.hand.includes(ec)){
        removeFromArr(ap.hand,ec);
        effortPile.push(ec);
      }
      if(pc!==null&&pc!==undefined&&ap.hand.includes(pc)){
        removeFromArr(ap.hand,pc);
        ap.partyPile.push(pc);
      }
      addLog(`${ap.name} played their cards secretly.`);
    }
  });
  shuffle(effortPile);
  G.effortPile=effortPile;
  G.revealIdx=0;
  G.lastCard=effortPile[effortPile.length-1];
  G.phase='reveal';
  render();
}

function doRevealNext(){
  if(G.revealIdx<G.effortPile.length-1){
    G.revealIdx++;
    if(G.revealIdx>=G.effortPile.length-1){
      // auto-show continue button, handled in render
    }
  }
  render();
}

function doSkipReveal(){
  G.revealIdx=G.effortPile.length-1;
  render();
}

function doAiDeadline(){
  const leader=getLeader();
  const revealed=G.effortPile.slice(0,-1);
  const revTotal=computeEffort(revealed,G.x3x2);
  const deficit=G.finalReq-revTotal;
  if(deficit>5&&G.skillsAvailable.length>0){
    addLog(`${leader.name} decides to USE A LEADERSHIP SKILL!`,'warn');
    G.usedSkill=true;
    G.phase='skill_select';
    // AI auto-picks first skill
    setTimeout(()=>doPickSkill(0),50);
  } else {
    addLog(`${leader.name} decides to LET IT RIDE!`);
    doLetItRide();
  }
}

function doLetItRide(){
  // Reveal final card and compute total
  G.finalPile=[...G.effortPile];
  G.finalTotal=computeEffort(G.finalPile,G.x3x2,true);
  const pass=G.finalTotal>=G.finalReq;
  G.passResult=pass;
  clearLog();
  if(!pass){
    const shortfall=G.finalReq-G.finalTotal;
    const active=getActive();
    addLog(`Final effort: ${G.finalTotal} / ${G.finalReq} — short by ${shortfall}`,'bad');
  } else {
    addLog(`Final effort: ${G.finalTotal} / ${G.finalReq} — PASSED!`,'ok');
  }
  G.phase='result';
  render();
}

function doPickSkill(idx){
  const skill=G.skillsAvailable[idx];
  if(!skill) return;
  G.skillsAvailable.splice(idx,1);
  G.usedSkill=true;
  clearLog();
  addLog(`Using skill: ${skill}`,'warn');
  applySkill(skill);
}

function applySkill(skill){
  const pile=G.effortPile; // full pile including last card
  const leader=getLeader();
  const active=getActive();

  if(skill==="Diversity is Our Strength"){
    const unique=new Set(pile.map(c=>c==='X2'?'X2':c));
    const bonus=unique.size;
    G.finalReq-=bonus;
    addLog(`${unique.size} unique values → effort required reduced by ${bonus} (now ${G.finalReq})!`,'ok');
    doAfterSkill();

  } else if(skill==="Personal Responsibility"){
    if(leader.isHuman){
      G.humanEffort=null;
      G.phase='skill_personal_resp';
      render();
    } else {
      const numeric=leader.hand.filter(c=>typeof c==='number').sort((a,b)=>b-a);
      if(!numeric.length){addLog('No cards to swap. Fizzles.','bad');doAfterSkill();return;}
      const swap=numeric[0];
      removeFromArr(leader.hand,swap);
      leader.hand.push(G.lastCard);
      const li=pile.lastIndexOf(G.lastCard);
      if(li>=0) pile[li]=swap; else pile.push(swap);
      G.lastCard=swap;
      addLog(`${leader.name} swaps in ${cardLabel(swap)} — face-down card replaced!`,'ok');
      doAfterSkill();
    }

  } else if(skill==="Realign Priorities"){
    const targets=active.filter(p=>p!==leader&&p.partyPile.length>0);
    if(!targets.length){addLog('No targets with party cards. Fizzles.','bad');doAfterSkill();return;}
    if(leader.isHuman){
      G._realignTargets=targets;
      G.phase='skill_realign';
      render();
    } else {
      const target=targets.reduce((b,p)=>topPartyVal(p)>topPartyVal(b)?p:b);
      const top=target.partyPile.pop();
      target.partyPile.push(G.lastCard);
      const li=pile.lastIndexOf(G.lastCard);
      if(li>=0) pile[li]=top; else pile.push(top);
      G.lastCard=top;
      addLog(`${target.name}'s top party card ${cardLabel(top)} → effort pile!`,'ok');
      doAfterSkill();
    }

  } else if(skill==="Pull an All Nighter"){
    const others=active.filter(p=>p!==leader&&p.hand.filter(c=>typeof c==='number').length>0);
    if(!others.length){addLog('No valid targets. Fizzles.','bad');doAfterSkill();return;}
    if(leader.isHuman){
      G.allNighterTargets=[];
      G._anOthers=others;
      G.phase='skill_all_nighter_pick';
      render();
    } else {
      const chosen=shuffle([...others]).slice(0,Math.min(2,others.length));
      doAnProcess(chosen);
    }

  } else if(skill==="Round of Coffee"){
    const onesTwos=pile.filter(c=>typeof c==='number'&&(c===1||c===2));
    const bonus=onesTwos.reduce((s,c)=>s+c,0);
    G.finalReq-=bonus;
    addLog(`All 1s and 2s doubled → effort reduced by ${bonus} (now ${G.finalReq})!`,'ok');
    doAfterSkill();

  } else if(skill==="Extend the Deadline"){
    G.extendPickupPile=[...pile];
    G.effortPile=[];
    G.extendNewPile=[];
    // AI players immediately pick up and replay
    const humanIdx=active.findIndex(p=>p.isHuman);
    active.forEach(p=>{
      if(!p.isHuman&&G.extendPickupPile.length>0){
        const ri=randInt(0,G.extendPickupPile.length-1);
        const picked=G.extendPickupPile.splice(ri,1)[0];
        p.hand.push(picked);
        addLog(`${p.name} picks up ${cardLabel(picked)}`);
      }
    });
    if(humanIdx>=0&&G.extendPickupPile.length>0){
      G.phase='skill_extend_pickup';
      G.humanEffort=null;
      render();
    } else {
      // no human or pile empty — go straight to replay
      active.forEach(p=>{
        if(!p.isHuman){
          const ec=aiPickEffort(p,G.finalReq,active.length);
          const chosen=ec&&p.hand.includes(ec)?ec:(p.hand.find(c=>typeof c==='number')||p.hand[0]);
          if(chosen){removeFromArr(p.hand,chosen);G.extendNewPile.push(chosen);}
        }
      });
      if(humanIdx>=0){
        G.phase='skill_extend_replay';
        G.humanEffort=null;
        render();
      } else {
        finishExtend();
      }
    }

  } else if(skill==="Plagiarize"){
    const x2c=pile.filter(c=>c==='X2').length;
    if(!x2c){addLog('No X2 cards. Fizzles.','bad');doAfterSkill();return;}
    G.x3x2=true;
    const nums=pile.filter(c=>typeof c==='number').sort((a,b)=>b-a);
    const bonus=nums.slice(0,x2c).reduce((s,c)=>s+c,0);
    G.finalReq-=bonus;
    addLog(`${x2c} X2 card(s) become X3! +${bonus} extra → effort reduced to ${G.finalReq}!`,'ok');
    doAfterSkill();

  } else if(skill==="Curve the Grade"){
    G.finalReq-=6;
    G.nextExamBonus+=6;
    addLog(`Effort reduced by 6 (now ${G.finalReq}). Next exam will be 6 harder.`,'warn');
    doAfterSkill();

  } else if(skill==="Leave the Group"){
    // Discard the last card without revealing
    const li=G.effortPile.lastIndexOf(G.lastCard);
    if(li>=0) G.effortPile.splice(li,1);
    G.finalReq-=3;
    leader.immuneBlame=true;
    addLog(`Final card discarded unrevealed. Effort reduced by 3 (now ${G.finalReq}). ${leader.name} immune from blame.`,'ok');
    G.lastCard=G.effortPile.length?G.effortPile[G.effortPile.length-1]:null;
    doAfterSkill();
  }
}

function doAfterSkill(){
  // After auto-skills or interactive ones, proceed to reveal/resolve
  doLetItRide();
}

function doSkillPersonalRespConfirm(){
  const leader=getLeader();
  const swap=G.humanEffort;
  if(!swap||!leader.hand.includes(swap)) return;
  removeFromArr(leader.hand,swap);
  leader.hand.push(G.lastCard);
  const li=G.effortPile.lastIndexOf(G.lastCard);
  if(li>=0) G.effortPile[li]=swap; else G.effortPile.push(swap);
  G.lastCard=swap;
  addLog(`You swap in ${cardLabel(swap)} — face-down card replaced!`,'ok');
  G.humanEffort=null;
  doAfterSkill();
}

function doSkillRealignPick(idx){
  const targets=G._realignTargets;
  const target=targets[idx];
  if(!target) return;
  const top=target.partyPile.pop();
  target.partyPile.push(G.lastCard);
  const li=G.effortPile.lastIndexOf(G.lastCard);
  if(li>=0) G.effortPile[li]=top; else G.effortPile.push(top);
  G.lastCard=top;
  addLog(`${target.name}'s top party card ${cardLabel(top)} → effort pile!`,'ok');
  doAfterSkill();
}

function doAnToggle(idx){
  if(!G.allNighterTargets) G.allNighterTargets=[];
  const i=G.allNighterTargets.indexOf(idx);
  if(i>=0) G.allNighterTargets.splice(i,1);
  else if(G.allNighterTargets.length<2) G.allNighterTargets.push(idx);
  render();
}

function doAnConfirm(){
  const others=G._anOthers;
  const chosen=G.allNighterTargets.map(i=>others[i]).filter(Boolean);
  doAnProcess(chosen);
}

function doAnProcess(chosen){
  const active=getActive();
  const humanChosen=chosen.find(p=>p.isHuman);
  chosen.forEach(p=>{
    if(!p.isHuman){
      const ec=aiPickEffort(p,G.finalReq,active.length);
      const c=ec&&p.hand.includes(ec)?ec:(p.hand.find(c=>typeof c==='number')||null);
      if(c){removeFromArr(p.hand,c);G.effortPile.push(c);addLog(`${p.name} pulls an all-nighter and plays ${cardLabel(c)}!`,'warn');}
    }
  });
  shuffle(G.effortPile);
  G.lastCard=G.effortPile[G.effortPile.length-1];
  if(humanChosen){
    G.humanEffort=null;
    G.phase='skill_all_nighter_extra';
    render();
  } else {
    doAfterSkill();
  }
}

function doAnExtraConfirm(){
  const p=humanPlayer();
  const c=G.humanEffort;
  if(!c||!p.hand.includes(c)) return;
  removeFromArr(p.hand,c);
  G.effortPile.push(c);
  shuffle(G.effortPile);
  G.lastCard=G.effortPile[G.effortPile.length-1];
  addLog(`You play ${cardLabel(c)} as extra effort!`,'warn');
  G.humanEffort=null;
  doAfterSkill();
}

function doExtPickup(idx){
  const card=G.extendPickupPile.splice(idx,1)[0];
  humanPlayer().hand.push(card);
  addLog(`You pick up ${cardLabel(card)}`,'ok');
  // Now do AI replays, then human replay
  const active=getActive();
  active.forEach(p=>{
    if(!p.isHuman){
      const ec=aiPickEffort(p,G.finalReq,active.length);
      const c=ec&&p.hand.includes(ec)?ec:(p.hand.find(c=>typeof c==='number')||p.hand[0]||null);
      if(c){removeFromArr(p.hand,c);G.extendNewPile.push(c);}
    }
  });
  G.humanEffort=null;
  G.phase='skill_extend_replay';
  render();
}

function doExtReplayConfirm(){
  const p=humanPlayer();
  const c=G.humanEffort;
  if(!c||!p.hand.includes(c)) return;
  removeFromArr(p.hand,c);
  G.extendNewPile.push(c);
  addLog(`You replay ${cardLabel(c)}`,'ok');
  G.humanEffort=null;
  finishExtend();
}

function finishExtend(){
  shuffle(G.extendNewPile);
  G.effortPile=[...G.extendNewPile];
  G.lastCard=G.effortPile.length?G.effortPile[G.effortPile.length-1]:null;
  addLog('Effort pile rebuilt and reshuffled!','ok');
  doAfterSkill();
}

// AFTER RESULT
function doAfterResult(){
  clearLog();
  const pass=G.passResult;
  const leader=getLeader();
  const active=getActive();
  if(pass){
    if(!G.usedSkill){
      leader.celPts+=G.exam.cel;
      addLog(`${leader.name} earns ${G.exam.cel} Celebration Points!`,'ok');
      if(G.skillDeck.length){
        const s=G.skillDeck.pop();
        G.skillsAvailable.push(s);
        addLog(`New skill earned: ${s}`,'ok');
      }
      // Celebrate award
      const candidates=active.filter(p=>p!==leader);
      if(candidates.length>0){
        G.celebCandidates=candidates;
        if(leader.isHuman){
          G.phase='celebrate';
          render();
          return;
        } else {
          const rec=rand(candidates);
          rec.celPts+=2;
          addLog(`${leader.name} awards 2 bonus Celebration Points to ${rec.name}!`,'ok');
        }
      }
    } else {
      addLog('No celebration points — a skill was used.','warn');
    }
    clearBlameState();
    G.phase='round_end';
    render();
  } else {
    // FAIL
    const shortfall=G.finalReq-G.finalTotal;
    const isMajor=G.usedSkill||(shortfall>=active.length);
    active.forEach(p=>p.failMarkers++);
    addLog('Everyone gets 1 fail marker.','bad');
    if(isMajor){
      addLog('MAJOR FAIL — everyone discards their top Party Pile card!','bad');
      active.forEach(p=>{
        const d=discardTopParty(p);
        if(d!==null) addLog(`${p.name} discards ${cardLabel(d)}.`,'bad');
      });
      // Check expulsions
      active.forEach(p=>{
        if(p.failMarkers>=4&&!p.eliminated){
          p.eliminated=true;
          addLog(`${p.name} has been EXPELLED! (4 fail markers)`,'bad');
        }
      });
      // blame
      const blameable=getActive().filter(p=>p!==leader&&!p.immuneBlame);
      if(blameable.length>0){
        G._blameable=blameable;
        G.phase='blame_accuse';
        render();
        return;
      }
    } else {
      addLog('MINOR FAIL — player(s) with highest top Party card discard it.','warn');
      const topVals=active.map(p=>topPartyVal(p));
      const maxV=Math.max(...topVals);
      if(maxV>0){
        active.filter(p=>topPartyVal(p)===maxV).forEach(p=>{
          const d=discardTopParty(p);
          if(d!==null) addLog(`${p.name} discards ${cardLabel(d)}.`,'warn');
        });
      }
      active.forEach(p=>{
        if(p.failMarkers>=4&&!p.eliminated){p.eliminated=true;addLog(`${p.name} has been EXPELLED!`,'bad');}
      });
    }
    clearBlameState();
    G.phase='round_end';
    render();
  }
}

function doGiveCel(idx){
  if(idx>=0&&idx<G.celebCandidates.length){
    G.celebCandidates[idx].celPts+=2;
    addLog(`${G.celebCandidates[idx].name} gets 2 bonus Celebration Points!`,'ok');
  }
  if(G.skillDeck.length){
    const s=G.skillDeck.pop();
    G.skillsAvailable.push(s);
    addLog(`New skill earned: ${s}`,'ok');
  }
  clearBlameState();
  G.phase='round_end';
  render();
}

function doAccuse(idx){
  const blameable=G._blameable;
  const accused=blameable[idx];
  if(!accused) return;
  G.blameAccused=accused;
  const leader=getLeader();
  const active=getActive();
  G.blameVoters=active.filter(p=>p!==leader&&p!==accused&&!p.eliminated);
  G.blameVoterIdx=0;
  G.blameYes=0;G.blameNo=0;
  addLog(`${leader.name} accuses ${accused.name}!`,'bad');
  G.phase='blame_vote';
  render();
}

function doSkipBlame(){
  clearBlameState();
  G.phase='round_end';
  render();
}

function doAiVote(){
  const voter=G.blameVoters[G.blameVoterIdx];
  const guilty=Math.random()<0.55;
  if(guilty){G.blameYes++;addLog(`${voter.name}: GUILTY`,'bad');}
  else{G.blameNo++;addLog(`${voter.name}: not guilty`);}
  G.blameVoterIdx++;
  render();
}

function doHumanVote(guilty){
  if(guilty){G.blameYes++;addLog('You vote: GUILTY','bad');}
  else{G.blameNo++;addLog('You vote: not guilty');}
  G.blameVoterIdx++;
  render();
}

function doAfterBlameVote(){
  const accused=G.blameAccused;
  const leader=getLeader();
  const needed=Math.max(1,G.blameVoters.length*0.5);
  const guilty=G.blameVoters.length===0||G.blameYes>=needed;
  if(guilty){
    accused.failMarkers++;
    if(accused.failMarkers>=4&&!accused.eliminated){accused.eliminated=true;addLog(`${accused.name} EXPELLED!`,'bad');}
    addLog(`${G.blameYes}-${G.blameNo} GUILTY — ${accused.name} gets a personal fail marker!`,'bad');
    G.blameResult='guilty';
    clearBlameState();
    G.phase='round_end';
    render();
  } else {
    addLog(`${G.blameYes}-${G.blameNo} NOT GUILTY — ${accused.name} may redirect blame to ${leader.name}!`,'warn');
    G.blameResult='innocent';
    G.phase='blame_redirect';
    render();
  }
}

function doAiRedirect(){
  const accused=G.blameAccused;
  const leader=getLeader();
  const redirect=Math.random()<0.6;
  if(redirect){
    addLog(`${accused.name} redirects blame to ${leader.name}!`,'warn');
    const active=getActive();
    const voters=active.filter(p=>p!==leader&&!p.eliminated);
    let yes2=0;
    voters.forEach(v=>{ if(Math.random()<0.5) yes2++; });
    if(yes2>=Math.max(1,voters.length*0.5)){
      leader.failMarkers++;
      if(leader.failMarkers>=4&&!leader.eliminated){leader.eliminated=true;addLog(`${leader.name} EXPELLED!`,'bad');}
      addLog(`${leader.name} found GUILTY! Personal fail marker!`,'bad');
    } else {
      addLog(`${leader.name} also NOT GUILTY. Blame dropped.`);
    }
  } else {
    addLog(`${accused.name} drops it.`);
  }
  clearBlameState();
  G.phase='round_end';
  render();
}

function doHumanRedirect(redirect){
  const leader=getLeader();
  if(redirect){
    addLog(`You redirect blame to ${leader.name}!`,'warn');
    const active=getActive();
    const voters=active.filter(p=>p!==leader&&!p.eliminated);
    let yes2=0;
    voters.forEach(v=>{ if(Math.random()<0.5) yes2++; });
    if(yes2>=Math.max(1,voters.length*0.5)){
      leader.failMarkers++;
      if(leader.failMarkers>=4&&!leader.eliminated){leader.eliminated=true;addLog(`${leader.name} EXPELLED!`,'bad');}
      addLog(`${leader.name} found GUILTY! Fail marker added!`,'bad');
    } else {
      addLog(`${leader.name} also NOT GUILTY. Blame dropped.`);
    }
  } else {
    addLog('You drop the blame. Moving on.');
  }
  clearBlameState();
  G.phase='round_end';
  render();
}

function clearBlameState(){
  G.players.forEach(p=>p.immuneBlame=false);
  G.blameAccused=null;
  G._blameable=null;
}

function doNextRound(){
  clearLog();
  const active=getActive();
  if(active.length<=1){G.phase='end';render();return;}
  if(G.roundNum===4){
    doHalftime();
    return;
  }
  G.leaderIdx=(G.leaderIdx+1)%4;
  G.roundNum++;
  if(G.roundNum>8){G.phase='end';render();return;}
  startRound();
}

function doHalftime(){
  const active=getActive();
  const ranked=[...active].sort((a,b)=>(partyTotal(b)+b.celPts)-(partyTotal(a)+a.celPts));
  ranked.forEach(p=>{ p.halftimePts=partyTotal(p)+p.celPts; });
  const n=ranked.length;
  ranked.forEach((p,i)=>{
    const noShow=i<2;
    const desp=i>=n-2;
    p.partyPile=[];
    buildHand(p,noShow,desp);
  });
  G.phase='halftime';
  render();
}

function doStartSecondHalf(){
  G.leaderIdx=(G.leaderIdx+1)%4;
  G.roundNum=5;
  startRound();
}

// ============================================================
// INIT
// ============================================================
window.onload=function(){
  G.phase='title';
  render();
};
</script>
